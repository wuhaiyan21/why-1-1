version: "3.8"

services:
  expense-dashboard:
    build: .
    container_name: expense-dashboard
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    restart: unless-stopped

  yearly-summary:
    build: .
    container_name: yearly-summary
    entrypoint: ["python", "yearly_summary.py"]
    command: ["--year", "2025", "--format", "csv", "--db", "/app/data/expenses.db", "--output-dir", "/app/output"]
    volumes:
      - .:/app
    profiles: ["tools"]
